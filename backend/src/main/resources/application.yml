spring:
  application:
    name: connectchat
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/connectchat}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope: email,profile
            redirect-uri: ${BACKEND_URL:http://localhost:8080}/api/auth/callback

server:
  port: 8080

management:
  endpoint:
    health:
      show-details: always

app:
  jwt:
    secret: ${JWT_SECRET:changeme-at-least-256-bits-long-for-hs256-algorithm}
    expiration-ms: 86400000
    refresh-expiration-ms: 604800000
  frontend-url: ${FRONTEND_URL:http://localhost:3000}
  cloudinary:
    cloud-name: ${CLOUDINARY_CLOUD_NAME}
    api-key: ${CLOUDINARY_API_KEY}
    api-secret: ${CLOUDINARY_API_SECRET}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  firebase:
    service-account-path: ${FIREBASE_SERVICE_ACCOUNT_PATH:}
